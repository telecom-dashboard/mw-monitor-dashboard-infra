name: Terraform CI

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-ci.yml"
      - "terraform/**"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-ci.yml"
      - "terraform/**"

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET_NAME: ${{ vars.TF_STATE_BUCKET_NAME }}

jobs:
  terraform-fmt:
    name: Terraform Fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive terraform

  terraform-dev:
    name: Terraform Dev
    runs-on: ubuntu-latest
    needs: terraform-fmt

    defaults:
      run:
        working-directory: terraform/envs/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required CI variables
        run: |
          test -n "${AWS_REGION}" || (echo "Missing repository variable: AWS_REGION" && exit 1)
          test -n "${TF_STATE_BUCKET_NAME}" || (echo "Missing repository variable: TF_STATE_BUCKET_NAME" && exit 1)
          test -n "${{ vars.AWS_TERRAFORM_DEV_ROLE_ARN }}" || (echo "Missing repository variable: AWS_TERRAFORM_DEV_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false -no-color -var-file="dev.tfvars" -out=tfplan
          terraform show -no-color tfplan > terraform-plan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform/envs/dev/terraform-plan.txt
          if-no-files-found: error
          retention-days: 7

  terraform-prod:
    name: Terraform Prod
    runs-on: ubuntu-latest
    needs: terraform-fmt

    defaults:
      run:
        working-directory: terraform/envs/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required CI variables
        run: |
          test -n "${AWS_REGION}" || (echo "Missing repository variable: AWS_REGION" && exit 1)
          test -n "${TF_STATE_BUCKET_NAME}" || (echo "Missing repository variable: TF_STATE_BUCKET_NAME" && exit 1)
          test -n "${{ vars.AWS_TERRAFORM_PROD_ROLE_ARN }}" || (echo "Missing repository variable: AWS_TERRAFORM_PROD_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify caller identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false -no-color -var-file="prod.tfvars" -out=tfplan
          terraform show -no-color tfplan > terraform-plan.txt

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod
          path: terraform/envs/prod/terraform-plan.txt
          if-no-files-found: error
          retention-days: 7